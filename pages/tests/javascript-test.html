<!DOCTYPE html>
<script>

	function number_bigger_than_10(){
		const numberElement = document.getElementById("numero");
		const number = parseInt(numberElement.innerText, 10) + 1;
		numberElement.innerText = number;

		if (number > 10){
			document.getElementById("texto").innerHTML = "o número é maior que 10 :0"
		}
	}

</script>   

<html>
	<body>
		<a href="/html-chair-projects/index.html">Voltar</a>
		
		<h1>Jabba Script teste</h1>

		<button onclick="number_bigger_than_10()">
			clique para aumentar numero
		</button>

		<p id="numero">0</p>

		<p id="texto"></p>
	</body>
</html>
